<!DOCTYPE html>
<html>
<head>
<title>Login Signup</title>

<style>
:root{
    --neon:#00f5ff;
    --bg:#020d1c;
    --card:#020d1c;
}

/* BODY */
body{
    margin:0;
    font-family:Arial;
    background: var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MAIN */
.container{
    position:relative;
    width:1000px;
    height:650px;
    overflow:hidden;
    border-radius:12px;
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(0,255,255,0.2); /* subtle neon border */
}

/* FORMS */
.form-box{
    position:absolute;
    width:50%;
    height:100%;
    top:0;
    transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
}

/* LOGIN */
.login{
    left:0;
}

/* SIGNUP */
.signup{
    left:50%;
    transform: translateX(100%);
}

/* ACTIVE */
.container.active .login{
    transform: translateX(-100%);
}

.container.active .signup{
    transform: translateX(0);
}

/* FORM */
form{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:50px;
}

/* TITLE */
h2{
    color: var(--neon);
}

/* INPUT */
input{
    margin:12px 0;
    padding:12px;
    border-radius:6px;
    border:1px solid rgba(0,255,255,0.3);
    background:transparent;
    color:white;
}

/* PLACEHOLDER */
input::placeholder{
    color:#9fbad0;
}

/* INPUT FOCUS (light only) */
input:focus{
    outline:none;
    border-color:var(--neon);
}

/* BUTTON */
button{
    margin-top:10px;
    padding:12px;
    background: var(--neon);
    color:black;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* LINK */
.link{
    margin-top:10px;
    color:var(--neon);
    cursor:pointer;
}

/* GREETING PANEL */
.overlay{
    position:absolute;
    width:50%;
    height:100%;
    right:0;
    background: var(--card);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
}
form{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:50px;
    animation: fadeSlide 0.6s ease;
}

@keyframes fadeSlide{
    from{
        opacity:0;
        transform: translateY(20px) scale(0.98);
    }
    to{
        opacity:1;
        transform: translateY(0) scale(1);
    }
}
input, button{
    transition: all 0.25s ease;
}

button:hover{
    transform: translateY(-2px);
}

/* MOVE */
.container.active .overlay{
    transform: translateX(-100%);
}

/* TEXT */
.overlay h2{
    font-size:28px;
    color:var(--neon);
}

.overlay p{
    opacity:0.8;
}
</style>

</head>

<body>

<div class="container" id="box">

    <!-- LOGIN -->
    <div class="form-box login">
        <form>
            <h2>Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button type="button" onclick="goDashboard()">Login</button>
            <div class="link" onclick="signup()">Create Account</div>
        </form>
    </div>

    <!-- SIGNUP -->
    <div class="form-box signup">
        <form>
            <h2>Create Account</h2>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Gmail">
            <input type="password" placeholder="Password">
            <button type="button" onclick="goDashboard()">Register</button>
            <div class="link" onclick="login()">Back to Login</div>
        </form>
    </div>

    <!-- GREETING -->
    <div class="overlay">
        <div>
            <h2 id="title">Welcome Back!</h2>
            <p id="desc">Login to continue 🚀</p>
        </div>
    </div>

</div>

<script>
function signup(){
    document.getElementById("box").classList.add("active");
    document.getElementById("title").innerText = "Hello Friend!";
    document.getElementById("desc").innerText = "Create your account ✨";
}

function login(){
    document.getElementById("box").classList.remove("active");
    document.getElementById("title").innerText = "Welcome Back!";
    document.getElementById("desc").innerText = "Login to continue 🚀";
}

    document.getElementById("box").classList.add("active");
    document.getElementById("title").innerText = "Hello Friend!";
    document.getElementById("desc").innerText = "Create your account ✨";
}

    document.getElementById("box").classList.remove("active");
    document.getElementById("title").innerText = "Welcome Back!";
    document.getElementById("desc").innerText = "Login to continue 🚀";
}

/* REDIRECT FUNCTION */
function goDashboard(){
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atherl Projects</title>

<style>
:root{
    --bg:#020c1b;
    --sidebar:#061426;
    --card:#0b1f3a;
    --input:#071a2f;
    --text:#cfe9ff;
    --muted:#7fa8c9;
    --neon:#00f5ff;
    --green:#00c853;
    --red:#ff5252;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    display:flex;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:var(--sidebar);
    padding:20px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.sidebar h2{
    color:var(--neon);
    margin-bottom:20px;
}

.menu a{
    display:block;
    padding:12px;
    margin:10px 0;
    color:var(--muted);
    text-decoration:none;
    border-radius:8px;
}

.menu a:hover{
    background:rgba(0,245,255,0.1);
    color:white;
}

/* PROFILE */
.profile{
    display:flex;
    gap:10px;
    align-items:center;
    border-top:1px solid rgba(255,255,255,0.05);
    padding-top:12px;
    margin-bottom:25px;

    cursor:pointer; /* 🔥 clickable */
}

.profile img{
    width:35px;
    height:35px;
    border-radius:50%;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
    width:100%;
}

/* FORM */
.form-box{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    background:var(--input);
    color:var(--text);
    border-radius:6px;
}

/* BUTTON */
.btn{
    margin-top:10px;
    padding:12px;
    background:var(--neon);
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* PROJECT CARD */
.project{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    position:relative;
}

.status{
    display:inline-block;
    background:var(--green);
    padding:5px 10px;
    border-radius:6px;
    font-size:12px;
    margin:10px 0;
}

.progress{
    height:6px;
    background:#123;
    border-radius:6px;
    overflow:hidden;
    margin:10px 0;
}

.progress span{
    display:block;
    height:100%;
    background:var(--neon);
}

.tags{
    display:flex;
    gap:15px;
    color:var(--muted);
}

/* DELETE */
.delete{
    position:absolute;
    top:15px;
    right:15px;
    background:var(--red);
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div>
        <h2>Atherl</h2>

        <div class="menu">
            <a href="dashboard.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="feedback.html">Feedback</a>
            <a href="profile.html">Profile</a>
        </div>
    </div>

    <!-- CLICKABLE PROFILE -->
    <div class="profile" onclick="goProfile()">
        <img src="https://i.pravatar.cc/40">
        <div>
            <strong>Admin</strong><br>
            <small>Online</small>
        </div>
    </div>

</div>

<div class="main">

    <div class="form-box">
        <h2>Project Manager</h2>

        <input id="name" placeholder="Project Name">
        <textarea id="desc" placeholder="Description"></textarea>
        <input id="algo" placeholder="Algorithms">
        <input id="tools" placeholder="Tools">
        <input id="features" placeholder="Features">

        <select id="status">
            <option>Active</option>
            <option>Completed</option>
            <option>Pending</option>
        </select>

        <input type="number" id="progress" placeholder="Progress %">

        <button class="btn" onclick="addProject()">Add Project</button>
    </div>

    <div id="projectList"></div>

</div>

<script>

/* NAVIGATION */
function goProfile(){
    window.location.href = "profile.html";
}

let projects = JSON.parse(localStorage.getItem("projects")) || [];

function loadProjects(){
    let box = document.getElementById("projectList");
    box.innerHTML = "";

    projects.forEach((p, index)=>{
        box.innerHTML += `
        <div class="project">
            <button class="delete" onclick="deleteProject(${index})">X</button>

            <h3>${p.name}</h3>
            <p>${p.desc}</p>

            <span class="status">${p.status}</span>

            <div class="progress">
                <span style="width:${p.progress}%"></span>
            </div>

            <div class="tags">
                <span>⚙ ${p.algo}</span>
                <span>🛠 ${p.tools}</span>
                <span>🚀 ${p.features}</span>
            </div>
        </div>
        `;
    });
}

function addProject(){
let project = {
    name: name.value,
    desc: desc.value,
    algo: algo.value,
    tools: tools.value,
    features: features.value,
    status: status.value,
    progress: progress.value
};

if(!project.name || !project.desc){
    alert("Enter required fields");
    return;
}

projects.push(project);
localStorage.setItem("projects", JSON.stringify(projects));

loadProjects();

name.value="";
desc.value="";
algo.value="";
tools.value="";
features.value="";
progress.value="";
}

function deleteProject(index){
    projects.splice(index,1);
    localStorage.setItem("projects", JSON.stringify(projects));
    loadProjects();
}

loadProjects();

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020c1b;
  --sidebar:#061426;
  --card:#0b1f3a;
  --card2:#071a2f;
  --text:#cfe9ff;
  --muted:#7fa8c9;
  --neon:#00f5ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:var(--sidebar);
  padding:20px;
}

.logo{
  font-size:22px;
  color:var(--neon);
  margin-bottom:30px;
}

.menu a{
  display:block;
  padding:12px;
  margin:10px 0;
  color:var(--muted);
  text-decoration:none;
  border-radius:8px;
  transition:0.2s;
}

.menu a:hover,
.menu .active{
  background:var(--card);
  color:var(--neon);
}

/* MAIN */
.main{
  margin-left:220px;
  padding:25px;
  width:100%;
}

.topbar{
  margin-bottom:20px;
}

/* PROJECT CARD */
.client-card{
  background:linear-gradient(145deg,#0c254a,#081a33);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  transition:0.3s;
}

.client-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px rgba(0,245,255,0.2);
}

.client-card p{
  color:var(--muted);
  margin-bottom:15px;
}

.client-card button{
  padding:10px 15px;
  background:var(--neon);
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:var(--card);
  padding:25px;
  border-radius:12px;
  width:350px;
}

.subtext{
  color:var(--muted);
  font-size:13px;
  margin-bottom:15px;
}

textarea{
  width:100%;
  height:100px;
  background:var(--card2);
  border:none;
  color:white;
  padding:10px;
  border-radius:6px;
  margin-bottom:15px;
}

.stars span{
  font-size:22px;
  cursor:pointer;
  color:#555;
}

.stars .active{
  color:gold;
}

.popup-content button{
  margin-right:10px;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.popup-content button:first-of-type{
  background:var(--neon);
}

.popup-content button:last-of-type{
  background:#222;
  color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Ather</div>

  <div class="menu">
    <a href="cdashboard.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="cprofile.html">profile</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h2>PROJECTS</h2>
  </div>

  <div id="projectContainer"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">

    <h3>Share your thoughts 💬</h3>
    <p class="subtext">Tell us your ideas about this project</p>

    <textarea id="feedbackInput" placeholder="Add your thoughts..."></textarea>

    <div class="stars" id="stars">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>

    <button onclick="submitFeedback()">Submit</button>
    <button onclick="closePopup()">Cancel</button>

  </div>
</div>

<script>
let projects = [
  {name:"Neural Synthesizer v4", admin:"Admin A"},
  {name:"Quantum Stream Filter", admin:"Admin B"},
  {name:"Ghost Protocol Shield", admin:"Admin C"},
  {name:"AI Prediction Engine", admin:"Admin D"}
];

let currentProject = "";
let rating = 0;

function loadProjects(){
  let container = document.getElementById("projectContainer");
  container.innerHTML = "";

  projects.forEach(p=>{
    let card = document.createElement("div");
    card.className = "client-card";

    card.innerHTML = `
      <h3>${p.name}</h3>
      <p>Admin: ${p.admin}</p>
      <button onclick="openPopup('${p.name}')">Add Feedback</button>
    `;

    container.appendChild(card);
  });
}

function openPopup(project){
  currentProject = project;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function rate(val){
  rating = val;
  let stars = document.querySelectorAll("#stars span");

  stars.forEach((s,i)=>{
    if(i < val) s.classList.add("active");
    else s.classList.remove("active");
  });
}

function submitFeedback(){
  let text = document.getElementById("feedbackInput").value;

  if(text === ""){
    alert("Enter feedback");
    return;
  }

  let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

  feedbacks.push({
    client:"Client User",
    project:currentProject,
    messages:[
      { text:text + " ⭐" + rating, type:"client" }
    ]
  });

  localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

  alert("Feedback submitted successfully 🔥");

  document.getElementById("feedbackInput").value = "";
  rating = 0;
  closePopup();
}

loadProjects();
</script>

</body>
</html>
